<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON_SNAKE_OS // TERMINAL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  
  
  <style>
    body {
      background-color: #050505;
      color: #00ffff;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }

    /* CRT Scanline Effect */
    .crt::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 50;
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
    }

    /* Screen Flicker */
    .crt::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: rgba(0, 255, 255, 0.02);
      opacity: 0;
      z-index: 50;
      pointer-events: none;
      animation: flicker 0.15s infinite;
    }

    @keyframes flicker {
      0% { opacity: 0.02; }
      50% { opacity: 0.05; }
      100% { opacity: 0.02; }
    }

    /* Glitch Text Effect */
    .glitch-text {
      position: relative;
      display: inline-block;
    }

    .glitch-text::before,
    .glitch-text::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #050505;
    }

    .glitch-text::before {
      left: 2px;
      text-shadow: -2px 0 #ff00ff;
      clip: rect(24px, 550px, 90px, 0);
      animation: glitch-anim-2 3s infinite linear alternate-reverse;
    }

    .glitch-text::after {
      left: -2px;
      text-shadow: -2px 0 #00ffff;
      clip: rect(85px, 550px, 140px, 0);
      animation: glitch-anim 2.5s infinite linear alternate-reverse;
    }

    @keyframes glitch-anim {
      0% { clip: rect(14px, 9999px, 11px, 0); }
      5% { clip: rect(85px, 9999px, 98px, 0); }
      10% { clip: rect(47px, 9999px, 15px, 0); }
      15% { clip: rect(93px, 9999px, 53px, 0); }
      20% { clip: rect(11px, 9999px, 85px, 0); }
      25% { clip: rect(34px, 9999px, 12px, 0); }
      30% { clip: rect(76px, 9999px, 99px, 0); }
      35% { clip: rect(23px, 9999px, 45px, 0); }
      40% { clip: rect(88px, 9999px, 22px, 0); }
      45% { clip: rect(12px, 9999px, 77px, 0); }
      50% { clip: rect(55px, 9999px, 33px, 0); }
      55% { clip: rect(99px, 9999px, 11px, 0); }
      60% { clip: rect(44px, 9999px, 88px, 0); }
      65% { clip: rect(22px, 9999px, 55px, 0); }
      70% { clip: rect(77px, 9999px, 22px, 0); }
      75% { clip: rect(11px, 9999px, 99px, 0); }
      80% { clip: rect(88px, 9999px, 44px, 0); }
      85% { clip: rect(33px, 9999px, 77px, 0); }
      90% { clip: rect(99px, 9999px, 11px, 0); }
      95% { clip: rect(55px, 9999px, 88px, 0); }
      100% { clip: rect(22px, 9999px, 33px, 0); }
    }

    @keyframes glitch-anim-2 {
      0% { clip: rect(65px, 9999px, 100px, 0); }
      5% { clip: rect(52px, 9999px, 74px, 0); }
      10% { clip: rect(79px, 9999px, 85px, 0); }
      15% { clip: rect(75px, 9999px, 5px, 0); }
      20% { clip: rect(67px, 9999px, 61px, 0); }
      25% { clip: rect(14px, 9999px, 79px, 0); }
      30% { clip: rect(1px, 9999px, 66px, 0); }
      35% { clip: rect(86px, 9999px, 30px, 0); }
      40% { clip: rect(23px, 9999px, 98px, 0); }
      45% { clip: rect(85px, 9999px, 72px, 0); }
      50% { clip: rect(71px, 9999px, 75px, 0); }
      55% { clip: rect(2px, 9999px, 48px, 0); }
      60% { clip: rect(30px, 9999px, 16px, 0); }
      65% { clip: rect(59px, 9999px, 50px, 0); }
      70% { clip: rect(41px, 9999px, 62px, 0); }
      75% { clip: rect(2px, 9999px, 82px, 0); }
      80% { clip: rect(47px, 9999px, 73px, 0); }
      85% { clip: rect(3px, 9999px, 27px, 0); }
      90% { clip: rect(26px, 9999px, 55px, 0); }
      95% { clip: rect(42px, 9999px, 97px, 0); }
      100% { clip: rect(38px, 9999px, 49px, 0); }
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #050505;
      border-left: 1px solid #ff00ff;
    }
    ::-webkit-scrollbar-thumb {
      background: #00ffff;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #ff00ff;
    }
  </style>
</head>
<body class="crt h-screen w-screen flex items-center justify-center">
  <div id="root" class="w-full h-full max-w-6xl max-h-[900px] p-4 relative z-10"></div>
  <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.js"></script></body>
</html>
